<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #1e293b; --bg: #f8fafc; --danger: #ef4444; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* Login Bereich */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--secondary); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-card { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 320px; }

        /* Container Layout */
        #mainContent { 
            display: none; 
            width: 100%; 
            max-width: 600px; 
            padding: 15px;
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; 
            margin-bottom: 20px; 
        }

        /* Header & Logout oben rechts */
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .btn-logout { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }

        h2 { color: var(--secondary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 0; text-align: center; font-size: 1.25rem; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #64748b; font-size: 13px; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0 15px 0; 
            border: 1.5px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* Verhindert Auto-Zoom auf iPhones */
        }

        .btn-add { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; background: var(--primary); color: white; font-size: 16px; transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); }

        /* Tisch-Sektion oben */
        .table-config { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-end; 
            gap: 10px; 
            background: #f1f5f9; 
            padding: 15px; 
            border-radius: 10px; 
        }
        .table-config div { flex-grow: 1; }
        .table-config input { margin-bottom: 0; }
        .btn-save-tables { width: auto; padding: 12px 15px; background: var(--secondary); }

        /* Menü-Liste */
        .category-header { background: #f1f5f9; padding: 6px 12px; border-radius: 6px; margin-top: 20px; font-weight: bold; color: var(--secondary); font-size: 14px; }
        ul { list-style: none; padding: 0; margin: 5px 0; }
        li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #f1f5f9; 
            gap: 10px; 
        }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .edit-input { border: none; background: transparent; font-family: inherit; font-size: 16px; width: 100%; color: var(--secondary); }
        .edit-input:focus { background: #fffce0; outline: none; border-radius: 4px; }
        .price-input { width: 70px; text-align: right; font-weight: bold; color: var(--primary); }

        /* Handy-Anpassungen */
        @media (max-width: 480px) {
            body { padding: 5px; }
            .card { padding: 15px; }
            .table-config { flex-direction: column; align-items: stretch; }
            .btn-save-tables { width: 100%; margin-top: 10px; }
            li { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2>🔑 Management</h2>
        <input type="password" id="passInput" placeholder="Passwort" onkeydown="if(event.key === 'Enter') checkLogin()">
        <button class="btn-add" onclick="checkLogin()">Einloggen</button>
        <p id="errorMsg" style="color:var(--danger); display:none; margin-top:10px; font-size: 14px;">Falsches Passwort!</p>
    </div>
</div>

<div id="mainContent">
    <div class="top-bar">
        <button class="btn-logout" onclick="location.reload()">✖ Abmelden</button>
    </div>

    <div class="card">
        <h2>🪑 Tischeinstellungen</h2>
        <div class="table-config">
            <div>
                <label>Anzahl der Tische:</label>
                <input type="number" id="tableCountInput" min="1" placeholder="z.B. 15">
            </div>
            <button class="btn-add btn-save-tables" onclick="updateTableCount()">Speichern</button>
        </div>
    </div>

    <div class="card">
        <h2>⚙️ Speisekarte pflegen</h2>
        <label>Produktname:</label>
        <input type="text" id="itemName" placeholder="z.B. Schnitzel">
        <label>Preis (€):</label>
        <input type="number" id="itemPrice" step="0.01" placeholder="0.00">
        <label>Kategorie:</label>
        <select id="itemCategory">
            <option value="G">🥤 Getränk</option>
            <option value="S">🍕 Speise</option>
            <option value="N">🍰 Nachspeise</option>
        </select>
        <button class="btn-add" onclick="addItem()">Hinzufügen</button>
        
        <div id="menuDisplay"></div>
    </div>
</div>

<script>
    const MASTER_PASSWORD = "Passwort"; 
    const firebaseConfig = { databaseURL: "https://mein-restaurante-default-rtdb.europe-west1.firebasedatabase.app/" };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        const input = document.getElementById('passInput').value;
        if(input === MASTER_PASSWORD) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            initApp();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function initApp() {
        db.ref('restaurantMenu').on('value', snapshot => {
            const menu = snapshot.val();
            const display = document.getElementById('menuDisplay');
            display.innerHTML = "";
            if(!menu) return;
            const categories = { "G": "🥤 Getränke", "S": "🍕 Speisen", "N": "🍰 Nachspeisen" };
            for (let key in categories) {
                display.innerHTML += `<div class="category-header">${categories[key]}</div><ul id="list-${key}"></ul>`;
                const list = document.getElementById(`list-${key}`);
                for(let id in menu) {
                    if(menu[id].cat === key) {
                        list.innerHTML += `<li>
                            <input class="edit-input" value="${menu[id].name}" onchange="updateItem('${id}', 'name', this.value)">
                            <div style="display:flex; align-items:center;">
                                <input class="edit-input price-input" type="number" step="0.01" value="${menu[id].price || 0}" onchange="updateItem('${id}', 'price', this.value)">
                                <span style="font-weight:bold; margin-right:10px;">€</span>
                                <button class="btn-delete" onclick="removeItem('${id}')">✕</button>
                            </div>
                        </li>`;
                    }
                }
            }
        });

        db.ref('settings/tableCount').on('value', snapshot => {
            if(snapshot.exists()) document.getElementById('tableCountInput').value = snapshot.val();
        });
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value || "0.00";
        const cat = document.getElementById('itemCategory').value;
        if (name) {
            db.ref('restaurantMenu').push({ name: name, price: price, cat: cat });
            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
        }
    }

    function updateItem(id, field, value) {
        let updates = {};
        updates[field] = value;
        db.ref('restaurantMenu/' + id).update(updates);
    }

    function removeItem(id) {
        if(confirm("Dauerhaft löschen?")) { db.ref('restaurantMenu/' + id).remove(); }
    }

    function updateTableCount() {
        const count = document.getElementById('tableCountInput').value;
        if(count > 0) {
            db.ref('settings').update({ tableCount: count }).then(() => alert("Gespeichert!"));
        }
    }
</script>
</body>
</html>
