<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellung</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --input-bg: #ffffff;
            --text-main: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 { 
            font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 25px; 
            color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .input-group { margin-bottom: 25px; position: relative; }
        label { display: block; font-size: 14px; font-weight: 700; color: #000; margin-bottom: 8px; }

        input, select {
            width: 100%; padding: 12px 15px; 
            background: var(--input-bg);
            border: 1.5px solid #cbd5e1; 
            border-radius: 10px;
            color: var(--text-main); 
            font-size: 16px; 
            transition: all 0.2s; 
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .section-title { 
            margin-top: 20px; margin-bottom: 8px; font-weight: 700; font-size: 13px; 
            color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        
        .btn-add {
            background: var(--primary); color: white; border: none;
            width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; 
            font-size: 16px; font-weight: 700; margin-top: 8px; margin-bottom: 20px;
            transition: background 0.2s;
        }

        #basket {
            margin-top: 25px; background: #f8fafc;
            border-radius: 12px; padding: 20px; border: 2px dashed #cbd5e1;
        }

        .basket-item-container { padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
        .basket-item { display: flex; justify-content: space-between; align-items: center; }
        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty { background: #e2e8f0; border: none; border-radius: 6px; width: 32px; height: 32px; cursor: pointer; font-weight: bold; font-size: 18px; }

        .item-note {
            width: 100%; margin-top: 8px; font-size: 13px; border: 1px solid #e2e8f0;
            padding: 8px; border-radius: 8px; background: #fff; box-sizing: border-box;
        }

        .total-row { font-size: 18px; font-weight: 700; text-align: right; margin-top: 15px; padding-top: 10px; border-top: 2px solid #e2e8f0; }

        .btn-send {
            width: 100%; margin-top: 25px; padding: 18px; background: var(--accent);
            color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 800;
            cursor: pointer; box-shadow: 0 4px 6px rgba(34, 197, 94, 0.2); transition: 0.2s;
        }

        .btn-clear { background: transparent; color: #64748b; border: none; width: 100%; margin-top: 15px; cursor: pointer; font-size: 13px; text-decoration: underline; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; color: var(--accent); padding: 15px 30px; border-radius: 50px;
            font-weight: 800; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 2000;
            border: 2px solid var(--accent); animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { top: -60px; opacity: 0; } to { top: 20px; opacity: 1; } }
        
        input.error { border-color: var(--danger); background: #fff1f2; animation: shake 0.4s ease-in-out; }
        .error-hint { color: var(--danger); font-size: 12px; font-weight: bold; margin-top: 5px; display: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h2>📝 Bestellung</h2>
        
        <div class="input-group">
            <label id="tableLabel">Tischnummer (1 bis 30):</label>
            <input type="number" id="tableNumber" placeholder="Tischnummer" oninput="this.classList.remove('error'); document.getElementById('errorText').style.display='none';">
            <div id="errorText" class="error-hint">Bitte gib eine Tischnummer ein!</div>
        </div>

        <div class="section-title">🥤 Getränke</div>
        <select id="selectGetraenke"><option value="" disabled selected>Wählen.</option></select>
        <button class="btn-add" onclick="addToBasket('selectGetraenke')">+ Hinzufügen</button>

        <div class="section-title">🍕 Speisen</div>
        <select id="selectSpeisen"><option value="" disabled selected>Wählen.</option></select>
        <button class="btn-add" onclick="addToBasket('selectSpeisen')">+ Hinzufügen</button>

        <div class="section-title">🍰 Nachspeisen</div>
        <select id="selectNachspeisen"><option value="" disabled selected>Wählen.</option></select>
        <button class="btn-add" onclick="addToBasket('selectNachspeisen')">+ Hinzufügen</button>

        <div id="basket">
            <div class="basket-header">Dein Warenkorb:</div>
            <div id="basketList"><span>Noch leer.</span></div>
            <div id="totalDisplay"></div>
            <button class="btn-clear" onclick="clearBasket()">Warenkorb leeren</button>
        </div>

        <button class="btn-send" onclick="sendOrder()">🚀 JETZT BESTELLEN 🚀</button>
    </div>
</div>

<div id="toast" class="toast">✅ Bestellung gesendet!</div>

<script>
    const firebaseConfig = { databaseURL: "https://mein-restaurante-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentBasket = {}; 
    let menuPrices = {};
    let maxTables = 30;

    db.ref('settings/tableCount').on('value', (s) => {
        if(s.exists()) {
            maxTables = parseInt(s.val());
            document.getElementById('tableNumber').max = maxTables;
            document.getElementById('tableLabel').innerText = `Tischnummer (1 bis ${maxTables}):`;
        }
    });

    db.ref('restaurantMenu').on('value', (s) => {
        const menu = s.val();
        const sG = document.getElementById('selectGetraenke'), sS = document.getElementById('selectSpeisen'), sN = document.getElementById('selectNachspeisen');
        sG.innerHTML = sS.innerHTML = sN.innerHTML = '<option value="" disabled selected>Wählen.</option>';
        if (menu) {
            Object.values(menu).forEach(item => {
                menuPrices[item.name] = item.price || "0.00";
                let opt = document.createElement('option');
                opt.value = item.name;
                opt.text = `${item.name} (${parseFloat(item.price).toFixed(2)}€)`;
                if(item.cat === "G") sG.appendChild(opt); 
                else if(item.cat === "N") sN.appendChild(opt); 
                else sS.appendChild(opt);
            });
        }
    });

    function addToBasket(id) {
        const val = document.getElementById(id).value;
        if (!val) return;
        if (!currentBasket[val]) {
            currentBasket[val] = { qty: 1, note: "" };
        } else {
            currentBasket[val].qty += 1;
        }
        updateUI();
    }

    function changeQty(name, d) {
        currentBasket[name].qty += d;
        if (currentBasket[name].qty <= 0) delete currentBasket[name];
        updateUI();
    }

    function updateNote(name, text) {
        if(currentBasket[name]) currentBasket[name].note = text;
    }

    function updateUI() {
        const l = document.getElementById('basketList'), keys = Object.keys(currentBasket);
        const t = document.getElementById('totalDisplay');
        let totalSum = 0;
        if (!keys.length) {
            l.innerHTML = '<span>Noch leer.</span>';
            t.innerHTML = "";
            return;
        }
        l.innerHTML = keys.map(n => {
            let itemPrice = parseFloat(menuPrices[n]) || 0;
            let subtotal = itemPrice * currentBasket[n].qty;
            totalSum += subtotal;
            return `
            <div class="basket-item-container">
                <div class="basket-item">
                    <span>${n} (${itemPrice.toFixed(2)}€)</span>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="changeQty('${n}',-1)">-</button>
                        <b>${currentBasket[n].qty}</b>
                        <button class="btn-qty" onclick="changeQty('${n}',1)">+</button>
                    </div>
                </div>
                <input type="text" class="item-note" placeholder="Zusatzwunsch (z.B. ohne Zwiebeln)" 
                       value="${currentBasket[n].note}" 
                       oninput="updateNote('${n}', this.value)">
            </div>`;
        }).join("");
        t.innerHTML = `<div class="total-row">Gesamt: ${totalSum.toFixed(2)} €</div>`;
    }

    function clearBasket() { currentBasket = {}; updateUI(); }

    function sendOrder() {
        const tableInput = document.getElementById('tableNumber');
        const table = parseInt(tableInput.value);
        const items = Object.keys(currentBasket);

        if (!table || table < 1 || table > maxTables) {
            tableInput.classList.add('error');
            document.getElementById('errorText').style.display = 'block';
            tableInput.focus();
            return;
        }

        if (!items.length) return alert("Dein Warenkorb ist leer!");

        let totalOrderSum = 0;
        const productList = items.map(n => {
            let price = parseFloat(menuPrices[n]) || 0;
            totalOrderSum += price * currentBasket[n].qty;
            let noteContent = currentBasket[n].note ? ` (${currentBasket[n].note})` : "";
            return `${currentBasket[n].qty}x ${n}${noteContent}`;
        }).join(", ");

        db.ref('kitchenOrders').push({
            product: productList,
            total: totalOrderSum.toFixed(2) + " €",
            table: table,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            timestamp: Date.now()
        }).then(() => { 
            clearBasket(); 
            tableInput.value = "";
            showToast();
        });
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
</script>
</body>
</html>
