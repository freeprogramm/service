<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellung</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --secondary: #1e293b; --success: #22c55e; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        h2 { color: var(--secondary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 0; text-align: center; }
        .section-title { font-weight: bold; color: var(--primary); margin-top: 20px; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 16px; background: white; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; font-size: 16px; }
        .btn-send { background: var(--success); color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 20px; font-weight: bold; margin-top: 25px; box-shadow: 0 4px 6px rgba(34, 197, 94, 0.3); }
        #basket { background: #f8fafc; border-radius: 8px; padding: 15px; margin-top: 20px; border: 2px dashed #cbd5e1; }
        .basket-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 16px; }
        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty { background: #e2e8f0; border: none; border-radius: 6px; width: 35px; height: 35px; cursor: pointer; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-clear { background: #94a3b8; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 10px; width: 100%; }
        .total-row { margin-top: 15px; text-align: right; font-size: 18px; font-weight: bold; color: var(--secondary); border-top: 2px solid #e2e8f0; padding-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h2>📝 Bestellung</h2>
    <label id="tableLabel" style="font-size: 14px; font-weight: bold;">Tischnummer eingeben:</label>
    <input type="number" id="tableNumber" placeholder="Tischnummer" min="1">
    
    <div class="section-title">🥤 Getränke</div>
    <select id="selectGetraenke"><option value="" disabled selected>Wählen.</option></select>
    <button class="btn-add" onclick="addToBasket('selectGetraenke')">+ Hinzufügen</button>
    
    <div class="section-title">🍕 Speisen</div>
    <select id="selectSpeisen"><option value="" disabled selected>Wählen.</option></select>
    <button class="btn-add" onclick="addToBasket('selectSpeisen')">+ Hinzufügen</button>
    
    <div class="section-title">🍰 Nachspeisen</div>
    <select id="selectNachspeisen"><option value="" disabled selected>Wählen.</option></select>
    <button class="btn-add" onclick="addToBasket('selectNachspeisen')">+ Hinzufügen</button>
    
    <div id="basket">
        <div style="font-weight: bold; margin-bottom: 10px;">Dein Warenkorb:</div>
        <div id="basketList"><span>Noch leer.</span></div>
        <div id="totalDisplay"></div>
        <button class="btn-clear" onclick="clearBasket()">Warenkorb leeren</button>
    </div>
    
    <button class="btn-send" onclick="sendOrder()">🚀 JETZT BESTELLEN 🚀</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://mein-restaurante-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentBasket = {};
    let menuPrices = {};
    let maxTables = 99; // Standardwert

    // Tischanzahl aus den Settings laden
    db.ref('settings/tableCount').on('value', (snapshot) => {
        if(snapshot.exists()) {
            maxTables = parseInt(snapshot.val());
            document.getElementById('tableNumber').max = maxTables;
            document.getElementById('tableLabel').innerText = `Tischnummer (1 bis ${maxTables}):`;
        }
    });

    db.ref('restaurantMenu').on('value', (snapshot) => {
        const menu = snapshot.val();
        const sG = document.getElementById('selectGetraenke'), sS = document.getElementById('selectSpeisen'), sN = document.getElementById('selectNachspeisen');
        sG.innerHTML = sS.innerHTML = sN.innerHTML = '<option value="" disabled selected>Wählen.</option>';
        if (menu) {
            Object.values(menu).forEach(item => {
                menuPrices[item.name] = item.price || "0.00";
                let opt = document.createElement('option');
                opt.value = item.name;
                opt.text = `${item.name} (${parseFloat(menuPrices[item.name]).toFixed(2)}€)`;
                if(item.cat === "G") sG.appendChild(opt); 
                else if(item.cat === "N") sN.appendChild(opt); 
                else sS.appendChild(opt);
            });
        }
    });

    function addToBasket(id) {
        const val = document.getElementById(id).value;
        if (!val) return;
        currentBasket[val] = (currentBasket[val] || 0) + 1;
        updateUI();
    }

    function changeQty(name, d) {
        currentBasket[name] += d;
        if (currentBasket[name] <= 0) delete currentBasket[name];
        updateUI();
    }

    function updateUI() {
        const l = document.getElementById('basketList'), keys = Object.keys(currentBasket);
        const t = document.getElementById('totalDisplay');
        let totalSum = 0;

        if (!keys.length) {
            l.innerHTML = "<span>Noch leer.</span>";
            t.innerHTML = "";
            return;
        }

        l.innerHTML = keys.map(n => {
            let itemPrice = parseFloat(menuPrices[n]) || 0;
            let subtotal = itemPrice * currentBasket[n];
            totalSum += subtotal;
            return `
                <div class="basket-item">
                    <span>${n} (${itemPrice.toFixed(2)}€)</span>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="changeQty('${n}',-1)">-</button>
                        <b>${currentBasket[n]}</b>
                        <button class="btn-qty" onclick="changeQty('${n}',1)">+</button>
                    </div>
                </div>`;
        }).join("");

        t.innerHTML = `<div class="total-row">Gesamt: ${totalSum.toFixed(2)} €</div>`;
    }

    function clearBasket() { currentBasket = {}; updateUI(); }

    function sendOrder() {
        const table = parseInt(document.getElementById('tableNumber').value), items = Object.keys(currentBasket);
        
        if (!table || table < 1 || table > maxTables) {
            return alert(`Bitte eine gültige Tischnummer (1 bis ${maxTables}) eingeben!`);
        }
        if (!items.length) return alert("Dein Warenkorb ist leer!");
        
        let totalOrderSum = 0;
        const productList = items.map(n => {
            let price = parseFloat(menuPrices[n]) || 0;
            totalOrderSum += price * currentBasket[n];
            return `${currentBasket[n]}x ${n}`;
        }).join(", ");

        db.ref('kitchenOrders').push({
            product: productList,
            total: totalOrderSum.toFixed(2) + " €",
            table: table,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            timestamp: Date.now()
        }).then(() => { 
            clearBasket(); 
            document.getElementById('tableNumber').value = "";
            alert("Bestellung gesendet!"); 
        });
    }
</script>
</body>
</html>
