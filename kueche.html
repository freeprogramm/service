<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Küchen-Zentrale Glass Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍🍳</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-white: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --accent: #3b82f6;
            --warn-glass: rgba(254, 243, 199, 0.6);
            --urgent-glass: rgba(254, 226, 226, 0.6);
            --danger: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--main-bg);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0; 
            padding: 15px; 
            color: var(--text-main);
        }

        /* Passwort Overlay */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        #authOverlay div.login-box {
            background: white;
            padding: 30px; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center; border: 1px solid var(--glass-border);
            width: 90%; max-width: 320px;
        }

        #authOverlay input {
            padding: 15px; font-size: 1.2rem; border-radius: 15px; border: 1px solid #e2e8f0;
            text-align: center; width: 100%; box-sizing: border-box; outline: none;
            background: #f8fafc; transition: all 0.2s;
        }

        /* Fehler-Animation für das Input Feld */
        #authOverlay input.error {
            border-color: var(--danger);
            background: #fef2f2;
            animation: shake 0.4s;
        }

        #errorMsg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 10px;
            height: 20px; /* Platzhalter damit Box nicht springt */
            font-weight: 600;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #authOverlay button {
            width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold;
            background: var(--text-main); color: white; border: none; border-radius: 15px; 
            cursor: pointer; margin-top: 20px;
        }

        /* Top Bar & Header */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; max-width: 1400px; margin-left: auto; margin-right: auto;
        }
        .header { font-size: 1.5rem; font-weight: 800; color: #334155; margin: 0; }
        .btn-logout {
            background: var(--glass-white); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 12px; cursor: pointer; font-weight: 600;
            backdrop-filter: blur(10px); color: #64748b;
        }

        /* Responsive Grid */
        #kitchenDisplay { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            max-width: 1400px; margin: 0 auto;
        }

        @media (max-width: 480px) {
            #kitchenDisplay { grid-template-columns: 1fr; }
            .header { font-size: 1.2rem; }
        }

        /* Tickets */
        .order-ticket { 
            background: var(--glass-white);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 28px; padding: 20px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            display: flex; flex-direction: column; transition: all 0.3s ease;
        }
        .order-ticket.warn { background: var(--warn-glass); }
        .order-ticket.urgent { background: var(--urgent-glass); animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        .ticket-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-no { background: white; padding: 6px 14px; border-radius: 12px; font-size: 1.2rem; font-weight: 800; }
        .timer { font-family: monospace; font-size: 2rem; font-weight: 800; color: var(--accent); }
        .product-list { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: #0f172a; }
        .order-info { font-size: 0.9rem; color: #64748b; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; }
        .btn-done { margin-top: 15px; width: 100%; padding: 16px; background: #22c55e; color: white; border: none; border-radius: 18px; font-size: 1.3rem; font-weight: 800; cursor: pointer; }
        .empty-msg { text-align: center; grid-column: 1/-1; opacity: 0.5; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-box">
            <h2 style="margin-top:0;">KÜCHEN-LOGIN</h2>
            <input type="password" id="passInput" placeholder="Passwort">
            <div id="errorMsg">Falsches Passwort!</div>
            <button onclick="checkPass()">Anmelden</button>
        </div>
    </div>

    <div class="top-bar">
        <h1 class="header">👨‍🍳 KÜCHEN-ZENTRALE</h1>
        <button class="btn-logout" onclick="logout()">Abmelden 🔒</button>
    </div>

    <div id="kitchenDisplay"></div>

<script>
    const PASSWORT = "Passwort"; 
    const firebaseConfig = { databaseURL: "https://mein-restaurante-default-rtdb.europe-west1.firebasedatabase.app/" };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass() {
        const input = document.getElementById('passInput');
        const error = document.getElementById('errorMsg');

        if(input.value === PASSWORT) {
            document.getElementById('authOverlay').style.display = 'none';
            input.classList.remove('error');
            error.style.display = 'none';
        } else {
            // Fehler-Zustand aktivieren
            input.classList.add('error');
            error.style.display = 'block';
            input.value = "";
            
            // Shake-Effekt nach der Animation entfernen damit er erneut triggern kann
            setTimeout(() => {
                input.classList.remove('error');
            }, 400);
        }
    }

    function logout() {
        document.getElementById('passInput').value = "";
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('authOverlay').style.display = 'flex';
    }

    document.getElementById('passInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPass();
    });

    // --- RESTLICHE LOGIK ---

    function updateCountdowns() {
        const now = Date.now();
        document.querySelectorAll('.order-ticket').forEach(ticket => {
            const start = parseInt(ticket.getAttribute('data-start'));
            const timerElement = ticket.querySelector('.timer');
            const diff = now - start;
            const remaining = 600000 - diff;

            if (diff > 480000) ticket.className = 'order-ticket urgent';
            else if (diff > 300000) ticket.className = 'order-ticket warn';
            else ticket.className = 'order-ticket';

            if (remaining <= 0) {
                timerElement.innerText = "!!:!!";
            } else {
                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                timerElement.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
        });
    }

    db.ref('kitchenOrders').on('value', snapshot => {
        const orders = snapshot.val();
        const display = document.getElementById('kitchenDisplay');
        display.innerHTML = "";
        if (!orders) {
            display.innerHTML = '<div class="empty-msg">Keine offenen Bestellungen...</div>';
            return;
        }
        Object.keys(orders).sort((a, b) => orders[a].timestamp - orders[b].timestamp).forEach(id => {
            const o = orders[id];
            display.innerHTML += `
                <div class="order-ticket" id="ticket-${id}" data-start="${o.timestamp}">
                    <div class="ticket-top">
                        <div class="table-no">TISCH ${o.table}</div>
                        <div class="timer">--:--</div>
                    </div>
                    <div class="product-list">${o.product}</div>
                    <div class="order-info">
                        <span>${o.time} Uhr</span>
                        <span><b>${o.total || ""}</b></span>
                    </div>
                    <button class="btn-done" onclick="done('${id}')">ERLEDIGT ✓</button>
                </div>`;
        });
        updateCountdowns();
    });

    setInterval(updateCountdowns, 1000);

    window.done = id => {
        const el = document.getElementById('ticket-' + id);
        if(el) { el.style.transform = "scale(0.9)"; el.style.opacity = "0"; }
        setTimeout(() => db.ref('kitchenOrders/' + id).remove(), 250);
    };
</script>
</body>
</html>
